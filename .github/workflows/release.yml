name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag/name (e.g. v1.8.4). Leave empty for a dev build.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            NAME="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            NAME="${{ github.ref_name }}"
          else
            NAME="dev-${GITHUB_SHA::7}"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO Core + esptool
        run: pip install --upgrade platformio "esptool==4.8.1"

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Build firmware (gh_release)
        run: pio run -e gh_release

      - name: Merge into single flashable image
        run: |
          BUILD=.pio/build/gh_release
          # boot_app0 (OTA-data initializer) ships with the Arduino framework package.
          BOOT_APP0=$(find ~/.platformio/packages -path '*/partitions/boot_app0.bin' | head -n1)
          echo "boot_app0: $BOOT_APP0"
          # ESP32-C3 flash layout: bootloader@0x0, partitions@0x8000, otadata@0xe000, app@0x10000.
          python -m esptool --chip esp32c3 merge_bin \
            --output "$BUILD/Infinity-${{ steps.ver.outputs.name }}-merged.bin" \
            --flash_mode dio --flash_size 16MB \
            0x0    "$BUILD/bootloader.bin" \
            0x8000 "$BUILD/partitions.bin" \
            0xe000 "$BOOT_APP0" \
            0x10000 "$BUILD/firmware.bin"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Infinity-${{ steps.ver.outputs.name }}
          path: |
            .pio/build/gh_release/Infinity-${{ steps.ver.outputs.name }}-merged.bin
            .pio/build/gh_release/bootloader.bin
            .pio/build/gh_release/partitions.bin
            .pio/build/gh_release/firmware.bin
            .pio/build/gh_release/firmware.elf

      - name: Publish GitHub Release
        if: github.ref_type == 'tag' || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.name }}
          name: Infinity ${{ steps.ver.outputs.name }}
          generate_release_notes: true
          files: |
            .pio/build/gh_release/Infinity-${{ steps.ver.outputs.name }}-merged.bin
            .pio/build/gh_release/bootloader.bin
            .pio/build/gh_release/partitions.bin
            .pio/build/gh_release/firmware.bin
          body: |
            ## Flashing

            **Easiest — single file, flash at offset `0x0`:**
            ```
            esptool --chip esp32c3 write_flash 0x0 Infinity-${{ steps.ver.outputs.name }}-merged.bin
            ```
            Or use the web flasher at https://espressif.github.io/esptool-js/ — connect over USB, add `Infinity-${{ steps.ver.outputs.name }}-merged.bin` at address `0x0`, and program.

            **OTA / advanced:** flash `firmware.bin` alone at `0x10000` to keep existing settings.
